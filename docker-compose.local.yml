services:
  backend:
    command: uv run fastapi dev app/main.py --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    environment:
      - ENVIRONMENT=local
      - DEBUG=True
      - DATABASE_URL=${DB_URL}
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
  db:
    ports:
      - "5432:5432"