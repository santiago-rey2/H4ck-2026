services:
  backend:
    command: uv run fastapi dev app/main.py --host 0.0.0.0 --port 8000
    volumes:
      - ./backend/app:/app/app
    environment:
      ENVIRONMENT: local
      DEBUG: "True"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT:-5432}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DB_SERVER: db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: h4ck-2026-frontend-dev
    build:
      target: dev
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      VITE_BACKEND_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started

  db:
    ports:
      - "5432:5432"

volumes:
  frontend-node-modules:
