services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

  backend:
    image: h4ck-2026-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT:-5432}
      DB_SERVER: db
      SEED_ENABLED: ${SEED_ENABLED:-true}
      SEED_MIN_ITEMS: ${SEED_MIN_ITEMS:-100}
      SEED_RANDOM_SEED: ${SEED_RANDOM_SEED:-2026}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - app-network

  frontend:
    image: h4ck-2026-frontend-prod
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_BACKEND_URL: /api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
